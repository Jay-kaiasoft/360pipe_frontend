<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body class="bg-[#F8FAFF] min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

            <!-- Card 1: New Contacts -->
            <div class="bg-white rounded-2xl custom-shadow p-6 flex flex-col min-h-[160px]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded bg-[#00A96E] flex justify-center items-center text-white">
                        <i class="fa-solid fa-user-plus text-sm"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-700">New Contacts</span>
                </div>
                <div>
                    <div class="text-[40px] font-bold text-[#1e293b] leading-none">3</div>
                </div>
            </div>

            <!-- Card 2: Meetings -->
            <div class="bg-white rounded-2xl custom-shadow p-6 flex flex-col min-h-[160px]">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 rounded bg-[#3B82F6] flex justify-center items-center text-white">
                        <i class="fa-solid fa-users text-sm"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-700">Meetings</span>
                </div>
                <div>
                    <div class="text-[40px] font-bold text-[#1e293b] leading-none mb-3">2</div>
                </div>
                <div class="space-y-2 mt-auto w-full">
                    <div class="flex justify-between items-center bg-[#F8FAFC] px-3 py-1.5 rounded-md">
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-[#60A5FA]"></div>
                            <span class="text-xs font-medium text-slate-600">Net New</span>
                        </div>
                        <span class="text-xs font-bold text-slate-800">0</span>
                    </div>
                    <div class="flex justify-between items-center bg-[#F8FAFC] px-3 py-1.5 rounded-md">
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-[#2563EB]"></div>
                            <span class="text-xs font-medium text-slate-600">Existing</span>
                        </div>
                        <span class="text-xs font-bold text-slate-800">2</span>
                    </div>
                </div>
            </div>

            <!-- Card 3: Pipeline -->
            <div class="bg-white rounded-2xl custom-shadow p-6 flex flex-col min-h-[160px]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded bg-[#06B6D4] flex justify-center items-center text-white">
                        <i class="fa-solid fa-dollar-sign text-sm"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-700">Pipeline</span>
                </div>
                <div>
                    <div class="text-[40px] font-bold text-[#1e293b] leading-none tracking-tight">$7M</div>
                </div>
            </div>

            <!-- Card 4: Attainment -->
            <div class="bg-white rounded-2xl custom-shadow p-6 flex flex-col min-h-[160px]">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded bg-[#F97316] flex justify-center items-center text-white">
                        <i class="fa-solid fa-bullseye text-sm"></i>
                    </div>
                    <span class="text-sm font-medium text-slate-700">Attainment</span>
                </div>
                <div>
                    <div class="text-[40px] font-bold text-[#1e293b] leading-none tracking-tight mb-2">14%</div>
                </div>
                <div class="mt-auto w-full">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-slate-500 font-medium">Progress</span>
                        <span class="text-xs text-slate-800 font-bold">$1M / $7M</span>
                    </div>
                    <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                        <div class="h-full bg-[#F97316] rounded-full" style="width: 14%"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
